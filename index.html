<body>
    <div class="container">
        <h1>🏖️ Retirement Planning Dashboard - AB Version 1.6</h1>
        <div id="app"></div>
    </div>
    
    <script>
        const app = document.getElementById('app');
        // Track active charts to destroy them before re-rendering
        window.activeCharts = [];
        
        // State with all retirement planning inputs
        const state = {
            // Personal information
            currentAge: 0,
            currentYear: 2026,
            retirementAge: 0,
            yearsInRetirement: 0,
            
            // Financial assets
            taxableAssets: 0,
            pretaxAssets: 0,
            rothAssets: 0,
            
            // Contributions
            annualContribution: 0,
            
            // Investment returns
            projectedReturn: 0,
            conservativeReturn: 0,
            
            // Economics
            inflationRate: 0,
            effectiveTaxRate: 0,
            withdrawalRate: 0,
            withdrawalPercentageCustom: 4.0, // Custom percentage when using fixed-percentage model
            
            // Lifestyle
            annualMortgagePayment: 0,
            yearsUntilMortgagePaid: 0,
            
            // Spending flexibility
            spendingType: 'fixed-percentage', // 'fixed-percentage' or 'fixed-amount' or 'dynamic'
            customSpendingAmount: 0,
            
            // Longevity
            lifeExpectancy: 0,
            
            // Lump sums (special grants, inheritances, etc)
            lumpSums: []
        };
        
        // Saved scenarios for comparison
        let savedScenarios = [];
        
        // Format currency
        function fmt(num) {
            return '$' + num.toLocaleString('en-US', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            });
        }
        
        // Format percentage
        function pct(num) {
            return num.toFixed(1) + '%';
        }
        
        // Calculate total portfolio value
        function getTotalAssets() {
            return state.taxableAssets + state.pretaxAssets + state.rothAssets;
        }
        
        // Calculate portfolio at a given retirement age with specified return rate
        function calcPortfolioAtRetirement(retireAge, returnRate) {
            let balance = getTotalAssets();
            const yearsToRetire = retireAge - state.currentAge;
            
            // Add annual contributions and lump sums during working years
            for (let i = 0; i < yearsToRetire; i++) {
                balance = balance * (1 + returnRate / 100) + state.annualContribution;
                
                // Add lump sums if they occur in this year
                const year = state.currentYear + i;
                const lumpSumsThisYear = state.lumpSums.filter(ls => ls.year === year);
                for (let ls of lumpSumsThisYear) {
                    balance += ls.amount;
                }
            }
            
            return balance;
        }
        
        // Adjust value for inflation
        function adjustForInflation(futureValue, yearsOut) {
            return futureValue / Math.pow(1 + state.inflationRate / 100, yearsOut);
        }
        
        // Helper for normal distribution (Box-Muller)
        function gaussianRandom(mean, stdDev) {
            const u = 1 - Math.random();
            const v = Math.random();
            const z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
            return z * stdDev + mean;
        }

        // Calculate annual withdrawal based on spending type and year
        function calculateAnnualWithdrawal(currentBalance, initialBalance, yearInRetirement, overrideWithdrawalRate = null, age = 0) {
            const inflationMultiplier = Math.pow(1 + state.inflationRate / 100, yearInRetirement);
            
            if (overrideWithdrawalRate !== null) {
                // Standard retirement rule: Initial % adjusted for inflation annually
                return (initialBalance * (overrideWithdrawalRate / 100)) * inflationMultiplier;
            }
            
            if (state.spendingType === 'fixed-amount') {
                // Fixed amount (after-tax) in first year, grows with inflation
                const afterTaxSpending = state.customSpendingAmount * inflationMultiplier;
                return afterTaxSpending / (1 - state.effectiveTaxRate / 100);
            } else {
                // Standard retirement rule: Fixed % of initial portfolio, adjusted for inflation
                return (initialBalance * (state.withdrawalPercentageCustom / 100)) * inflationMultiplier;
            }
        }
        
        // Consistent simulation of the retirement phase
        function simulateRetirement(startBalance, yearsInRetirement, retireAge, overrideWithdrawalRate = null) {
            let balance = startBalance;
            let initialBalance = startBalance;
            let peakBalance = startBalance;
            const initialBalanceInTodaysDollars = adjustForInflation(initialBalance, retireAge - state.currentAge);

            for (let year = 0; year < yearsInRetirement; year++) {
                const currentAge = retireAge + year;
                // Use Gaussian distribution for more accurate market modeling (StdDev assumed 12%)
                const randomReturn = gaussianRandom(state.projectedReturn, 12);
                
                let withdrawal = calculateAnnualWithdrawal(balance, initialBalance, year, overrideWithdrawalRate, currentAge);
                
                // Apply dynamic adjustment if portfolio drops 20% from peak
                if (state.spendingType === 'dynamic' && balance < peakBalance * 0.8 && overrideWithdrawalRate === null) {
                    withdrawal *= 0.9;
                }
                
                balance = balance * (1 + randomReturn / 100) - withdrawal;
                if (balance > peakBalance) peakBalance = balance;
                if (balance <= 0) return { successRunOut: false, successGrowth: false, endBalance: 0 };
            }
            
            const yearsTotal = (retireAge - state.currentAge) + yearsInRetirement;
            const endBalanceInTodaysDollars = adjustForInflation(balance, yearsTotal);
            
            return { 
                successRunOut: balance > 0, 
                successGrowth: endBalanceInTodaysDollars >= initialBalanceInTodaysDollars, 
                endBalance: balance 
            };
        }

        // Run a Monte Carlo simulation for retirement success
        function runMonteCarloSimulation(retireAge, iterations = 1000, overrideWithdrawalRate = null) {
            const yearsToRetire = retireAge - state.currentAge;
            let runOutSuccess = 0;
            let growthSuccess = 0;
            const allPaths = [];
            
            for (let i = 0; i < iterations; i++) {
                let balance = getTotalAssets();
                const path = [];
                for (let year = 0; year < yearsToRetire; year++) {
                    const randomReturn = gaussianRandom(state.projectedReturn, 12);
                    balance = balance * (1 + randomReturn / 100) + state.annualContribution;
                    
                    const yearNum = state.currentYear + year;
                    const lumpSumsThisYear = state.lumpSums.filter(ls => ls.year === yearNum);
                    for (let ls of lumpSumsThisYear) balance += ls.amount;
                    path.push(balance);
                }
                
                const result = simulateRetirement(balance, state.yearsInRetirement, retireAge, overrideWithdrawalRate);
                if (result.successRunOut) runOutSuccess++;
                if (result.successGrowth) growthSuccess++;
                allPaths.push(path);
            }
            
            // Calculate median path for chart
            const medianPath = [];
            if (allPaths.length > 0) {
                for (let step = 0; step < yearsToRetire; step++) {
                    const valuesAtStep = allPaths.map(p => p[step]).sort((a, b) => a - b);
                    medianPath.push({
                        p10: valuesAtStep[Math.floor(iterations * 0.1)],
                        p50: valuesAtStep[Math.floor(iterations * 0.5)],
                        p90: valuesAtStep[Math.floor(iterations * 0.9)]
                    });
                }
            }

            return {
                longevity: (runOutSuccess / iterations) * 100,
                preservation: (growthSuccess / iterations) * 100,
                pathHistory: medianPath
            };
        }
        
        // Generate year-by-year breakdown
        function generateYearByYear() {
            let balance = getTotalAssets();
            const yearsToRetire = state.retirementAge - state.currentAge;
            const retirementYear = state.currentYear + yearsToRetire;
            const years = [];
            
            // Pre-retirement years
            for (let year = 0; year < yearsToRetire; year++) {
                const age = state.currentAge + year;
                const growth = balance * (state.projectedReturn / 100);
                balance = balance + growth + state.annualContribution;
                
                // Add lump sums if they occur in this year
                const yearNum = state.currentYear + year;
                const lumpSumsThisYear = state.lumpSums.filter(ls => ls.year === yearNum);
                for (let ls of lumpSumsThisYear) {
                    balance += ls.amount;
                }
                
                years.push({
                    year: yearNum,
                    age,
                    phase: 'accumulation',
                    contribution: state.annualContribution,
                    growth,
                    balance,
                    withdrawal: 0,
                    income: 0,
                    mortgage: 0
                });
            }
            
            // Post-retirement years
            const portfolioAtRetirement = balance;
            const mortgageEndAge = state.retirementAge + state.yearsUntilMortgagePaid;
            let peakBalance = balance; // For dynamic spending
            
            for (let year = 0; year < state.yearsInRetirement; year++) {
                const age = state.retirementAge + year;
                const mortgagePayment = age <= mortgageEndAge ? state.annualMortgagePayment : 0;
                const growth = balance * (state.projectedReturn / 100);
                
                // Calculate basic withdrawal based on model
                let annualWithdrawalAmount = calculateAnnualWithdrawal(balance, portfolioAtRetirement, year, null, age);
                
                // Apply Dynamic spending adjustment logic
                if (state.spendingType === 'dynamic' && balance < (peakBalance * 0.8)) {
                    annualWithdrawalAmount *= 0.9;
                }
                
                balance = balance + growth - annualWithdrawalAmount - mortgagePayment;
                
                // Update peak for future dynamic checks
                if (balance > peakBalance) peakBalance = balance;
                
                const yearsIntoRetirement = year;
                const balanceInTodaysDollars = adjustForInflation(Math.max(0, balance), yearsIntoRetirement);
                
                years.push({
                    year: state.currentYear + yearsToRetire + year,
                    age,
                    phase: 'retirement',
                    contribution: 0,
                    growth,
                    balance: Math.max(0, balance),
                    balanceInTodaysDollars,
                    withdrawal: annualWithdrawalAmount,
                    monthlyWithdrawalAfterTax: (annualWithdrawalAmount * (1 - state.effectiveTaxRate / 100)) / 12,
                    mortgage: mortgagePayment,
                    income: 0
                });
            }
            
            return years;
        }
        
        // Calculate RMD (Required Minimum Distribution)
        function calculateRMD(balance, age) {
            if (age < 73) return 0;
            const rmdTable = {
                73: 27.4, 74: 26.5, 75: 25.5, 76: 24.6, 77: 23.7, 78: 22.9,
                79: 22.0, 80: 21.1, 81: 20.2, 82: 19.4, 83: 18.5, 84: 17.7,
                85: 16.8, 86: 16.0, 87: 15.1, 88: 14.3, 89: 13.5, 90: 12.7
            };
            const divisor = rmdTable[age] || 12.7;
            return balance / divisor;
        }
        
        // Generate sensitivity analysis data
        function generateSensitivityAnalysis() {
            const retireAges = [39, 42, 45, 48, 51];
            const withdrawalRates = [3.0, 3.5, 4.0, 4.5, 5.0];
            const returns = [4.0, 5.0, 6.0, 7.0, 8.0];
            
            return {
                ageVsRate: generateMatrix(retireAges, withdrawalRates, (age, rate) => {
                    return runMonteCarloSimulation(age, 500, rate).longevity;
                }),
                ageVsReturn: generateMatrix(retireAges, returns, (age, ret) => {
                    const saved = state.projectedReturn;
                    state.projectedReturn = ret;
                    const result = runMonteCarloSimulation(age, 500).longevity;
                    state.projectedReturn = saved;
                    return result;
                }),
                rateVsReturn: generateMatrix(withdrawalRates, returns, (rate, ret) => {
                    const savedRet = state.projectedReturn;
                    state.projectedReturn = ret;
                    const result = runMonteCarloSimulation(state.retirementAge, 500, rate).longevity;
                    state.projectedReturn = savedRet;
                    return result;
                })
            };
        }
        
        function generateMatrix(rows, cols, fn) {
            const matrix = [];
            for (let row of rows) {
                const rowData = [];
                for (let col of cols) {
                    rowData.push(fn(row, col));
                }
                matrix.push(rowData);
            }
            return matrix;
        }
        
        // Scenario management
        function saveScenario(name) {
            const scenario = {
                id: Date.now(),
                name: name || `Scenario ${new Date().toLocaleString()}`,
                timestamp: new Date(),
                data: JSON.parse(JSON.stringify(state))
            };
            savedScenarios.push(scenario);
            localStorage.setItem('retirementScenarios', JSON.stringify(savedScenarios));
            render();
        }
        
        function loadScenario(id) {
            const scenario = savedScenarios.find(s => s.id === id);
            if (scenario) {
                Object.assign(state, scenario.data);
                render();
            }

        function calculateRequiredPortfolio(retireAge) {
            const cacheKey = `${retireAge}-${state.projectedReturn}-${state.spendingType}-${state.customSpendingAmount}-${state.withdrawalPercentageCustom}`;
            if (requiredPortfolioCache.has(cacheKey)) return requiredPortfolioCache.get(cacheKey);

            const yearsToRetire = retireAge - state.currentAge;
            if (yearsToRetire < 0) return 0;
            
            let low = 0;
            let high = 20000000; // Start with $20M upper bound
            let required = 0;
            
            // Binary search: find portfolio amount that gives 90% success
            for (let iteration = 0; iteration < 20; iteration++) {
                const mid = (low + high) / 2;
                let successCount = 0;
                const iterations = 200; // Faster check
                
                // Test this portfolio with Monte Carlo
                for (let i = 0; i < iterations; i++) {
                    const result = simulateRetirement(mid, state.yearsInRetirement, retireAge);
                    if (result.successRunOut) successCount++;
                }
                
                const successRate = (successCount / iterations) * 100;
                if (successRate >= 90) {
                    high = mid;
                    required = mid;
                } else {
                    low = mid;
                }
            }
            
            requiredPortfolioCache.set(cacheKey, required);
            return required;
        }

                                    </tr>
                                </thead>
                                <tbody>
                                    ${yearByYearData.filter(r => r.phase === 'accumulation').map(row => `
                                        <tr>
                                            <td>${row.year}</td>
                                            <td>${row.age}</td>
                                            <td>${fmt(row.contribution)}</td>
                                            <td class="positive">${fmt(row.growth)}</td>
                                            <td style="font-weight: 600; color: #388e3c;">${fmt(row.balance)}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div id="tab-retirement" class="tab-content">
                        <p class="info-text">Years after retirement showing annual withdrawals, mortgage payments, and portfolio decline/growth.</p>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Year</th>
                                        <th>Age</th>
                                        <th>Investment Growth</th>
                                        <th>Withdrawal</th>
                                        <th>Monthly Withdrawal (After Tax)</th>
                                        <th>Mortgage Payment</th>
                                        <th>Balance</th>
                                        <th>Balance (Today's Dollars)</th>
                                        <th>Required Portfolio for 90%</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${yearByYearData.filter(r => r.phase === 'retirement').map(row => {
                                        return `
                                            <tr>
                                                <td>${row.year}</td>
                                                <td>${row.age}</td>
                                                <td class="positive">${fmt(row.growth)}</td>
                                                <td>${fmt(row.withdrawal)}</td>
                                                <td>${fmt(row.monthlyWithdrawalAfterTax)}</td>
                                                <td>${row.mortgage > 0 ? fmt(row.mortgage) : '—'}</td>
                                                <td style="font-weight: 600; ${row.balance < 0 ? 'color: #dc2626;' : 'color: #388e3c;'}">${fmt(row.balance)}</td>
                                                <td style="font-weight: 600; color: #7b1fa2;">${fmt(row.balanceInTodaysDollars)}</td>
                                                <td style="font-weight: 600; ${row.balance >= requiredPortfolioAtRetirement ? 'color: #16a34a;' : 'color: #dc2626;'}">${fmt(requiredPortfolioAtRetirement)}</td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                
                <!-- SECTION 5: SCENARIO COMPARISON & MANAGER -->
                <div class="section">
                    <h2>💾 Scenario Manager</h2>
                    <p class="info-text">Save different retirement scenarios to compare various strategies and parameters.</p>
                    
                    <div style="margin-bottom: 20px;">
                        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                            <input type="text" id="scenarioName" placeholder="e.g., Conservative Plan" style="flex: 1; padding: 10px; border: 1px solid #e2e8f0; border-radius: 5px; font-size: 14px;"/>
                            <button id="saveScenarioBtn" style="padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: 600;">💾 Save Current</button>
                        </div>
                        
                        <div id="scenariosList">
                            ${savedScenarios.length === 0 ? '<p style="color: #999; font-size: 13px;">No saved scenarios yet. Create one above to compare different retirement plans.</p>' : ''}
                            ${savedScenarios.map(scenario => `
                                <div class="scenario-card">
                                    <div>
                                        <div class="scenario-name">${scenario.name}</div>
                                        <div class="scenario-meta">
                                            Retire at ${scenario.data.retirementAge}, ${scenario.data.projectedReturn}% return, ${scenario.data.withdrawalPercentageCustom}% withdrawal
                                        </div>
                                    </div>
                                    <div class="scenario-buttons">
                                        <button class="small-button compare" data-scenario-id="${scenario.id}">📊 Compare</button>
                                        <button class="small-button delete" data-scenario-id="${scenario.id}">🗑️</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                
                <!-- SECTION 6: SCENARIO COMPARISON SIDE-BY-SIDE -->
                <div class="section" id="comparisonSection" style="display: none;">
                    <h2>⚖️ Scenario Comparison</h2>
                    <div class="comparison-grid" id="comparisonGrid"></div>
                </div>
                
                <!-- SECTION 7: SENSITIVITY ANALYSIS -->
                <div class="section">
                    <h2>🎯 Sensitivity Analysis</h2>
                    <p class="info-text">Explore how changes in key variables affect your success probability. Green = 90%+ success, Yellow = 85-89%, Red = 84% or below.</p>
                    
                    <div style="margin-bottom: 30px;">
                        <h3 style="margin-bottom: 15px;">Age vs Withdrawal Rate</h3>
                        <div class="table-container" style="font-size: 12px;">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="padding: 8px;">Age</th>
                                        ${[3.0, 3.5, 4.0, 4.5, 5.0].map(r => `<th style="padding: 8px;">${r}% Withdrawal</th>`).join('')}
                                    </tr>
                                </thead>
                                <tbody>
                                    ${(() => {
                                        const sensitivity = generateSensitivityAnalysis();
                                        return [39, 42, 45, 48, 51].map((age, i) => `
                                            <tr>
                                                <td style="padding: 8px; font-weight: 600;">${age}</td>
                                                ${sensitivity.ageVsRate[i].map(pct => `
                                                    <td class="sensitivity-cell ${pct >= 90 ? 'high' : pct >= 85 ? 'medium' : 'low'}">
                                                        ${pct.toFixed(0)}%
                                                    </td>
                                                `).join('')}
                                            </tr>
                                        `).join('');
                                    })()}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 30px;">
                        <h3 style="margin-bottom: 15px;">Retirement Age vs Annual Return</h3>
                        <div class="table-container" style="font-size: 12px;">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="padding: 8px;">Age</th>
                                        ${[4.0, 5.0, 6.0, 7.0, 8.0].map(r => `<th style="padding: 8px;">${r}% Return</th>`).join('')}
                                    </tr>
                                </thead>
                                <tbody>
                                    ${(() => {
                                        const sensitivity = generateSensitivityAnalysis();
                                        return [39, 42, 45, 48, 51].map((age, i) => `
                                            <tr>
                                                <td style="padding: 8px; font-weight: 600;">${age}</td>
                                                ${sensitivity.ageVsReturn[i].map(pct => `
                                                    <td class="sensitivity-cell ${pct >= 90 ? 'high' : pct >= 85 ? 'medium' : 'low'}">
                                                        ${pct.toFixed(0)}%
                                                    </td>
                                                `).join('')}
                                            </tr>
                                        `).join('');
                                    })()}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                
                <!-- SECTION 8: LONGEVITY RISK ANALYSIS -->
                <div class="section">
                    <h2>🎂 Longevity Risk Analysis</h2>
                    <p class="info-text">Explore different life expectancy scenarios to understand longevity risk. Shows portfolio balance, required withdrawals, and RMD impact.</p>
                    
                    <div class="longevity-grid">
                        ${(() => {
                            const ages = [80, 85, 90, 95, 100];
                            const retirementYear = state.currentYear + (state.retirementAge - state.currentAge);
                            
                            return ages.map(age => {
                                if (age < state.retirementAge) return '';
                                const yearsInRetirement = age - state.retirementAge;
                                const yearByYear = generateYearByYear();
                                const dataAtAge = yearByYear.find(y => y.age === age);
                                const balance = dataAtAge ? dataAtAge.balance : 0;
                                const rmd = balance > 0 ? calculateRMD(balance, age) : 0;
                                const cardClass = balance > 0 ? 'success' : 'failure';
                                
                                return `
                                    <div class="longevity-card ${cardClass}">
                                        <div class="longevity-age">Age ${age}</div>
                                        <div class="longevity-metric"><strong>Year:</strong> ${retirementYear + yearsInRetirement}</div>
                                        <div class="longevity-metric"><strong>Portfolio:</strong> ${fmt(Math.max(0, balance))}</div>
                                        ${age >= 73 && balance > 0 ? `<div class="longevity-metric"><strong>Required RMD:</strong> ${fmt(rmd)}</div>` : ''}
                                        <div class="longevity-metric" style="margin-top: 8px; font-size: 11px; color: #666;">
                                            ${balance > 0 ? '✓ Portfolio active' : '⚠️ Portfolio depleted'}
                                        </div>
                                    </div>
                                `;
                            }).join('');
                        })()}
                    </div>
                </div>
                
                <!-- SECTION 9: PORTFOLIO VISUALIZATIONS -->
                <div class="section">
                    <h2>📈 Portfolio Visualizations</h2>
                    
                    <div style="margin-bottom: 40px;">
                        <h3 style="margin-bottom: 15px;">Portfolio Growth Over Time</h3>
                        <div class="chart-container">
                            <canvas id="growthChart"></canvas>
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 40px;">
                        <h3 style="margin-bottom: 15px;">Success Probability by Retirement Age</h3>
                        <div class="chart-container">
                            <canvas id="successChart"></canvas>
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 40px;">
                        <h3 style="margin-bottom: 15px;">Current Asset Allocation</h3>
                        <div class="chart-container">
                            <canvas id="allocationChart"></canvas>
                        </div>
                    </div>
                    
                    <div>
                        <h3 style="margin-bottom: 15px;">Inflation-Adjusted Purchasing Power</h3>
                        <div class="chart-container">
                            <canvas id="purchasingPowerChart"></canvas>
                        </div>
                    </div>
                </div>
                
                <footer>
                    💡 Edit any input value above to see real-time updates across all sections
                </footer>
            `;
            
            // Attach Calculate button listener
            const calculateBtn = document.getElementById('calculateBtn');
            if (calculateBtn) {
                calculateBtn.addEventListener('click', () => {
                    render();
                });
            }
            
            // Attach Download CSV listener
            const downloadCsvBtn = document.getElementById('downloadCsvBtn');
            if (downloadCsvBtn) {
                downloadCsvBtn.addEventListener('click', () => {
                    downloadCSV();
                });
            }
            
            // Attach Goal Seek listener
            const goalSeekBtn = document.getElementById('goalSeekBtn');
            if (goalSeekBtn) {
                goalSeekBtn.addEventListener('click', () => {
                    let low = 0;
                    let high = 500000;
                    let result = 0;
                    
                    // Binary search for contribution amount
                    for(let i=0; i<15; i++) {
                        const mid = (low + high) / 2;
                        const savedContrib = state.annualContribution;
                        state.annualContribution = mid;
                        const success = runMonteCarloSimulation(state.retirementAge, 200).longevity;
                        state.annualContribution = savedContrib;
                        
                        if (success >= 90) {
                            high = mid;
                            result = mid;
                        } else {
                            low = mid;
                        }
                    }
                    alert(`To reach a 90% success rate, your annual contribution should be: ${fmt(result)} (${fmt(result/12)}/mo)`);
                });
            }

            // Attach scenario management listeners
            const saveScenarioBtn = document.getElementById('saveScenarioBtn');
            if (saveScenarioBtn) {
                saveScenarioBtn.addEventListener('click', () => {
                    const name = document.getElementById('scenarioName').value || `Scenario ${new Date().toLocaleString()}`;
                    saveScenario(name);
                    document.getElementById('scenarioName').value = '';
                });
            }
            
            // Scenario compare buttons
            document.querySelectorAll('.small-button.compare').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const scenarioId = parseInt(e.target.dataset.scenarioId);
                    const scenario = savedScenarios.find(s => s.id === scenarioId);
                    if (scenario) {
                        showComparison(scenario);
                    }
                });
            });
            
            // Scenario delete buttons
            document.querySelectorAll('.small-button.delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (confirm('Delete this scenario?')) {
                        const scenarioId = parseInt(e.target.dataset.scenarioId);
                        deleteScenario(scenarioId);
                    }
                });
            });
            
            // Update state without re-rendering on input changes
            document.querySelectorAll('input[data-key]').forEach(input => {
                input.addEventListener('change', (e) => {
                    const value = parseFloat(e.target.value);
                    state[e.target.dataset.key] = isNaN(value) ? 0 : value;
                    render(); // Re-render for immediate feedback
                });
                
                // For range sliders, also update on 'input' for even smoother feedback
                input.addEventListener('input', (e) => {
                    const value = parseFloat(e.target.value);
                    state[e.target.dataset.key] = isNaN(value) ? 0 : value;
                    // We don't re-render full dashboard on every slider tick to avoid lag, 
                    // but we sync the sibling input if it exists
                    const sibling = e.target.parentElement.querySelector(e.target.type === 'range' ? 'input[type="number"]' : 'input[type="range"]');
                    if (sibling) sibling.value = e.target.value;
                });
            });
            
            // Handle select dropdowns
            document.querySelectorAll('select[data-key]').forEach(select => {
                select.addEventListener('change', (e) => {
                    state[e.target.dataset.key] = e.target.value;
                });
            });
            
            // Lump sum management
            const addLumpSumBtn = document.getElementById('addLumpSumBtn');
            if (addLumpSumBtn) {
                addLumpSumBtn.addEventListener('click', () => {
                    const amount = parseFloat(document.getElementById('lumpSumAmount').value) || 0;
                    const year = parseInt(document.getElementById('lumpSumYear').value) || state.currentYear;
                    if (amount > 0 && year > 0) {
                        addLumpSum(amount, year);
                        document.getElementById('lumpSumAmount').value = '';
                        document.getElementById('lumpSumYear').value = '';
                    }
                });
            }
            
            // Lump sum delete buttons
            document.querySelectorAll('.small-button.delete[data-lumpsum-id]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(e.target.dataset.lumpsumId);
                    deleteLumpSum(id);
                });
            });
            
            // Attach tab listeners
            document.querySelectorAll('.tab-button').forEach(button => {
                button.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    e.target.classList.add('active');
                    document.getElementById('tab-' + e.target.dataset.tab).classList.add('active');
                });
            });
            
            // Initialize charts
            initializeCharts(yearByYearData, monteCarloBase);
        }
        
        // Show scenario comparison
        function showComparison(comparisonScenario) {
            const baseScenario = state;
            const section = document.getElementById('comparisonSection');
            const grid = document.getElementById('comparisonGrid');
            
            if (!section || !grid) return;
            
            const baseMetrics = calculateScenarioMetrics(baseScenario);
            const compMetrics = calculateScenarioMetrics(comparisonScenario.data);
            
            grid.innerHTML = `
                <div class="comparison-card base">
                    <div class="comparison-title">Current Scenario</div>
                    ${Object.entries(baseMetrics).map(([key, value]) => `
                        <div class="comparison-row">
                            <div class="comparison-label">${key}</div>
                            <div class="comparison-value">${value}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="comparison-card">
                    <div class="comparison-title">${comparisonScenario.name}</div>
                    ${Object.entries(compMetrics).map(([key, value]) => `
                        <div class="comparison-row">
                            <div class="comparison-label">${key}</div>
                            <div class="comparison-value">${value}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            section.style.display = 'block';
            section.scrollIntoView({ behavior: 'smooth' });
        }
        
        // Calculate key metrics for a scenario
        function calculateScenarioMetrics(stateData) {
            const total = stateData.taxableAssets + stateData.pretaxAssets + stateData.rothAssets;
            const yearsToRet = stateData.retirementAge - stateData.currentAge;
            
            let balance = total;
            for (let i = 0; i < yearsToRet; i++) {
                balance = balance * (1 + stateData.projectedReturn / 100) + stateData.annualContribution;
            }
            
            // Calculate withdrawal using the same logic as the main dashboard
            let withdraw = 0;
            const initialPortfolio = balance;
            
            if (stateData.spendingType === 'fixed-amount') {
                // Note: Comparison metrics usually show first-year withdrawal
                const afterTaxSpending = stateData.customSpendingAmount;
                withdraw = afterTaxSpending / (1 - stateData.effectiveTaxRate / 100);
            } else {
                // fixed-percentage or dynamic start
                withdraw = initialPortfolio * (stateData.withdrawalPercentageCustom / 100);
            }
            
            const afterTax = withdraw * (1 - stateData.effectiveTaxRate / 100);
            
            // Use a local simulation to get success rate for comparison
            const getSuccessRate = () => {
                // Save global state temporarily
                const originalState = JSON.stringify(state);
                    Object.assign(state, stateData);
                    const rate = runMonteCarloSimulation(stateData.retirementAge, 300);
                    Object.assign(state, JSON.parse(originalState));
                    return rate;
                };
            
            return {
                'Retirement Age': stateData.retirementAge,
                'Years to Retire': yearsToRet,
                'Portfolio at Retirement': fmt(balance),
                'Annual Withdrawal': fmt(withdraw),
                'After-Tax Income': fmt(afterTax),
                'Monthly Income': fmt(afterTax / 12),
                'Success (Longevity)': pct(getSuccessRate().longevity),
                'Spending Type': stateData.spendingType,
                'Return Assumption': pct(stateData.projectedReturn),
                'Withdrawal Rate': pct(stateData.withdrawalPercentageCustom)
            };
        }
        
        // Initialize charts
        function initializeCharts(yearByYearData, monteCarloBase) {
            const chartConfig = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: true } }
            };
            
            // Destroy existing charts to prevent "Canvas is already in use" errors
            window.activeCharts.forEach(chart => chart.destroy());
            window.activeCharts = [];

            // Growth chart
            const growthCtx = document.getElementById('growthChart');
            if (growthCtx) {
                const accumulationData = yearByYearData.filter(y => y.phase === 'accumulation');
                const retirementData = yearByYearData.filter(y => y.phase === 'retirement');
                
                const chart = new Chart(growthCtx, {
                    type: 'line',
                    data: {
                        labels: yearByYearData.map(y => y.age),
                        datasets: [
                            {
                                label: 'Portfolio Balance',
                                data: yearByYearData.map(y => y.balance),
                                borderColor: '#667eea',
                                backgroundColor: 'rgba(102, 126, 234, 0.1)',
                                fill: true,
                                tension: 0.4,
                                borderWidth: 2
                            },
                            {
                                label: 'Bad Luck Scenario (10th Percentile)',
                                data: monteCarloBase.pathHistory.map(h => h.p10),
                                borderColor: '#dc2626',
                                borderDash: [5, 5],
                                borderWidth: 1,
                                fill: false
                            },
                            {
                                label: 'Good Luck Scenario (90th Percentile)',
                                data: monteCarloBase.pathHistory.map(h => h.p90),
                                borderColor: '#16a34a',
                                borderDash: [5, 5],
                                borderWidth: 2,
                                fill: false
                            }
                        ]
                    },
                    options: {
                        ...chartConfig,
                        scales: {
                            y: {
                                ticks: { callback: v => '$' + (v / 1000000).toFixed(1) + 'M' }
                            }
                        }
                    }
                });
                window.activeCharts.push(chart);
            }
            
            // Success probability chart
            const successCtx = document.getElementById('successChart');
            if (successCtx) {
                const ages = [39, 42, 45, 48, 51, 54, 57];
                const probs = ages.map(age => runMonteCarloSimulation(age, 500).longevity);
                
                const chart = new Chart(successCtx, {
                    type: 'bar',
                    data: {
                        labels: ages,
                        datasets: [{
                            label: 'Success Probability (%)',
                            data: probs,
                            backgroundColor: probs.map(p => 
                                p >= 90 ? '#16a34a' : p >= 85 ? '#f59e0b' : '#dc2626'
                            ),
                            borderRadius: 4
                        }]
                    },
                    options: {
                        ...chartConfig,
                        scales: {
                            y: { min: 0, max: 100 }
                        }
                    }
                });
                window.activeCharts.push(chart);
            }
            
            // Asset allocation chart
            const allocationCtx = document.getElementById('allocationChart');
            if (allocationCtx) {
                const chart = new Chart(allocationCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Taxable', 'Pre-Tax', 'Roth'],
                        datasets: [{
                            data: [state.taxableAssets, state.pretaxAssets, state.rothAssets],
                            backgroundColor: ['#3b82f6', '#8b5cf6', '#ec4899'],
                            borderColor: '#fff'
                        }]
                    },
                    options: {
                        ...chartConfig,
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });
                window.activeCharts.push(chart);
            }
            
            // Purchasing power chart
            const ppCtx = document.getElementById('purchasingPowerChart');
            if (ppCtx) {
                const retirementData = yearByYearData.filter(y => y.phase === 'retirement').slice(0, 20);
                
                const chart = new Chart(ppCtx, {
                    type: 'line',
                    data: {
                        labels: retirementData.map(y => y.age),
                        datasets: [{
                            label: 'Purchasing Power (Today\'s Dollars)',
                            data: retirementData.map(y => y.balanceInTodaysDollars || 0),
                            borderColor: '#8b5cf6',
                            backgroundColor: 'rgba(139, 92, 246, 0.1)',
                            fill: true,
                            tension: 0.4,
                            borderWidth: 2
                        }]
                    },
                    options: {
                        ...chartConfig,
                        scales: {
                            y: {
                                ticks: { callback: v => '$' + (v / 1000000).toFixed(1) + 'M' }
                            }
                        }
                    }
                });
                window.activeCharts.push(chart);
            }
        }
        
        // Initial render - load saved scenarios first
        loadSavedScenarios();
        render();
    </script>
</body>
</html>
