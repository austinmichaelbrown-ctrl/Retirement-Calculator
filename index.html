<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Planning Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {

            padding: 0;

        }
        
        body {

        footer {

        .input-group select {

        .input-group select:focus {

        .scenario-card {
            background: #f9fafb;

        .scenario-card.active {

        .scenario-buttons {

        .small-button {
            padding: 6px 12px;

        .small-button:hover {

        .small-button.delete:hover {

        }
        
        .small-button.compare:hover {

        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .comparison-card {
            background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
        }
        
        .comparison-card.base {
            border-color: #667eea;
            background: linear-gradient(135deg, #f0f4ff 0%, #e9ecff 100%);
        }
        
        .comparison-title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 15px;
            color: #2d3748;
        }
        
        .comparison-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
            font-size: 13px;
        }
        
        .comparison-row:last-child {
            border-bottom: none;
        }
        
        .comparison-label {
            color: #666;
        }
        
        .comparison-value {
            font-weight: 600;

        }
        
        .sensitivity-cell {
            text-align: center;
            padding: 8px;
            font-size: 12px;
            border-radius: 4px;
        }
        
        .sensitivity-cell.high {
            background: #dcfce7;
            color: #166534;
            font-weight: 600;
        }
        
        .sensitivity-cell.medium {
            background: #fef3c7;

        }
        
        .sensitivity-cell.low {

        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 30px;
        }
        
        .chart-wrapper {
            position: relative;
            height: 100%;
        }
        
        .longevity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;

            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #cbd5e0;
        }
        
        .longevity-card.success {
            border-left-color: #16a34a;
            background: #f0fdf4;
        }
        
        .longevity-card.warning {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }
        
        .longevity-card.failure {
            border-left-color: #dc2626;
            background: #fef2f2;
        }
        
        .longevity-age {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .longevity-metric {
            font-size: 12px;
            color: #666;
            margin: 3px 0;
        }
        
        .rmd-warning {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;

</head>
<body>
    <div class="container">
        <h1>🏖️ Retirement Planning Dashboard</h1>
        <div id="app"></div>
    </div>
    
    <script>
        const app = document.getElementById('app');
        
        // State with all retirement planning inputs
        const state = {
            // Personal information
            currentAge: 38,
            currentYear: 2026,
            retirementAge: 62,
            yearsInRetirement: 35,
            
            // Financial assets
            taxableAssets: 851286.69,
            pretaxAssets: 1374023.50,
            rothAssets: 144923.96,
            
            // Contributions
            annualContribution: 30000,
            
            // Investment returns
            projectedReturn: 7.0,
            conservativeReturn: 4.0,
            
            // Economics
            inflationRate: 2.5,
            effectiveTaxRate: 22.0,
            withdrawalRate: 4.0,
            
            // Lifestyle
            annualMortgagePayment: 35000,
            yearsUntilMortgagePaid: 15,
            
            // Spending flexibility
            spendingType: 'fixed-percentage', // 'fixed-percentage' or 'fixed-amount' or 'dynamic'
            customSpendingAmount: 0,
            
            // Longevity
            lifeExpectancy: 95
        };
        
        // Saved scenarios for comparison
        let savedScenarios = [];
        
        // Format currency
        function fmt(num) {
            return '$' + num.toLocaleString('en-US', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            });
        }
        
        // Format percentage
        function pct(num) {
            return num.toFixed(1) + '%';
        }
        
        // Calculate total portfolio value
        function getTotalAssets() {
            return state.taxableAssets + state.pretaxAssets + state.rothAssets;
        }
        
        // Calculate portfolio at a given retirement age with specified return rate
        function calcPortfolioAtRetirement(retireAge, returnRate) {
            let balance = getTotalAssets();
            const yearsToRetire = retireAge - state.currentAge;
            
            // Add annual contributions during working years
            for (let i = 0; i < yearsToRetire; i++) {
                balance = balance * (1 + returnRate / 100) + state.annualContribution;
            }
            
            return balance;
        }
        
        // Adjust value for inflation
        function adjustForInflation(futureValue, yearsOut) {
            return futureValue / Math.pow(1 + state.inflationRate / 100, yearsOut);
        }
        
        // Run a Monte Carlo simulation for retirement success
        function runMonteCarloSimulation(retireAge, iterations = 1000) {
            const yearsToRetire = retireAge - state.currentAge;
            const yearsInRetirement = state.yearsInRetirement;
            let successCount = 0;
            
            for (let i = 0; i < iterations; i++) {
                // Use normal distribution for returns (mean = projected, stdDev = 12%)
                let balance = getTotalAssets();
                
                // Accumulation phase
                for (let year = 0; year < yearsToRetire; year++) {
                    const randomReturn = (Math.random() + Math.random() + Math.random() + 
                                         Math.random() + Math.random() + Math.random() - 3) * 6 + 
                                        (state.projectedReturn - 2);
                    balance = balance * (1 + randomReturn / 100) + state.annualContribution;
                }
                
                // Withdrawal phase
                const initialBalance = balance;
                const annualWithdrawal = initialBalance * (state.withdrawalRate / 100);
                
                for (let year = 0; year < yearsInRetirement; year++) {
                    const randomReturn = (Math.random() + Math.random() + Math.random() + 
                                         Math.random() + Math.random() + Math.random() - 3) * 6 + 
                                        (state.projectedReturn - 2);
                    balance = balance * (1 + randomReturn / 100) - annualWithdrawal;
                    
                    if (balance < 0) break;
                }
                
                // Success = end balance is greater than starting balance (portfolio grew)
                if (balance > initialBalance) successCount++;
            }
            
            return (successCount / iterations) * 100;
        }
        
        // Generate year-by-year breakdown
        function generateYearByYear() {
            let balance = getTotalAssets();
            const yearsToRetire = state.retirementAge - state.currentAge;
            const retirementYear = state.currentYear + yearsToRetire;
            const years = [];
            
            // Pre-retirement years
            for (let year = 0; year < yearsToRetire; year++) {
                const age = state.currentAge + year;
                const growth = balance * (state.projectedReturn / 100);
                balance = balance + growth + state.annualContribution;
                years.push({
                    year: state.currentYear + year,
                    age,
                    phase: 'accumulation',
                    contribution: state.annualContribution,
                    growth,
                    balance,
                    withdrawal: 0,
                    income: 0,
                    mortgage: 0
                });
            }
            
            // Post-retirement years
            const portfolioAtRetirement = balance;
            let annualWithdrawal;
            
            if (state.spendingType === 'fixed-amount') {
                annualWithdrawal = state.customSpendingAmount;
            } else if (state.spendingType === 'dynamic') {
                // Dynamic: Start with 4% but adjust if portfolio drops below 80% of peak
                annualWithdrawal = portfolioAtRetirement * (state.withdrawalRate / 100);
            } else {
                // Fixed percentage (default)
                annualWithdrawal = portfolioAtRetirement * (state.withdrawalRate / 100);
            }
            
            const afterTaxWithdrawal = annualWithdrawal * (1 - state.effectiveTaxRate / 100);
            const mortgageEndAge = state.retirementAge + state.yearsUntilMortgagePaid;
            let peakBalance = balance; // For dynamic spending
            
            for (let year = 0; year < state.yearsInRetirement; year++) {
                const age = state.retirementAge + year;
                const mortgagePayment = age <= mortgageEndAge ? state.annualMortgagePayment : 0;
                const growth = balance * (state.projectedReturn / 100);
                
                let withdrawal = annualWithdrawal;
                
                // Dynamic spending adjustment
                if (state.spendingType === 'dynamic') {
                    if (balance < peakBalance * 0.8) {
                        withdrawal = withdrawal * 0.9; // Reduce spending by 10% if portfolio drops
                    }
                }
                
                balance = balance + growth - withdrawal - mortgagePayment;
                if (balance > peakBalance) peakBalance = balance;
                
                const yearsIntoRetirement = year;
                const balanceInTodaysDollars = adjustForInflation(Math.max(0, balance), yearsIntoRetirement);
                
                years.push({
                    year: state.currentYear + yearsToRetire + year,
                    age,
                    phase: 'retirement',
                    contribution: 0,
                    growth,
                    balance: Math.max(0, balance),
                    balanceInTodaysDollars,
                    withdrawal: withdrawal,
                    monthlyWithdrawalAfterTax: (withdrawal * (1 - state.effectiveTaxRate / 100)) / 12,
                    mortgage: mortgagePayment,
                    income: 0
                });
            }
            
            return years;
        }
        
        // Calculate RMD (Required Minimum Distribution)
        function calculateRMD(balance, age) {
            if (age < 73) return 0;
            const rmdTable = {
                73: 27.4, 74: 26.5, 75: 25.5, 76: 24.6, 77: 23.7, 78: 22.9,
                79: 22.0, 80: 21.1, 81: 20.2, 82: 19.4, 83: 18.5, 84: 17.7,
                85: 16.8, 86: 16.0, 87: 15.1, 88: 14.3, 89: 13.5, 90: 12.7
            };
            const divisor = rmdTable[age] || 12.7;
            return balance / divisor;
        }
        
        // Generate sensitivity analysis data
        function generateSensitivityAnalysis() {
            const retireAges = [55, 60, 62, 65, 70];
            const withdrawalRates = [3.0, 3.5, 4.0, 4.5, 5.0];
            const returns = [4.0, 5.0, 6.0, 7.0, 8.0];
            
            return {
                ageVsRate: generateMatrix(retireAges, withdrawalRates, (age, rate) => {
                    return runMonteCarloSimulation(age, 500);
                }),
                ageVsReturn: generateMatrix(retireAges, returns, (age, ret) => {
                    const saved = state.projectedReturn;
                    state.projectedReturn = ret;
                    const result = runMonteCarloSimulation(age, 500);
                    state.projectedReturn = saved;
                    return result;
                }),
                rateVsReturn: generateMatrix(withdrawalRates, returns, (rate, ret) => {
                    const savedRate = state.withdrawalRate;
                    const savedRet = state.projectedReturn;
                    state.withdrawalRate = rate;
                    state.projectedReturn = ret;
                    const result = runMonteCarloSimulation(state.retirementAge, 500);
                    state.withdrawalRate = savedRate;
                    state.projectedReturn = savedRet;
                    return result;
                })
            };
        }
        
        function generateMatrix(rows, cols, fn) {
            const matrix = [];
            for (let row of rows) {
                const rowData = [];
                for (let col of cols) {
                    rowData.push(fn(row, col));
                }
                matrix.push(rowData);
            }
            return matrix;
        }
        
        // Scenario management
        function saveScenario(name) {
            const scenario = {
                id: Date.now(),
                name: name || `Scenario ${new Date().toLocaleString()}`,
                timestamp: new Date(),
                data: JSON.parse(JSON.stringify(state))
            };
            savedScenarios.push(scenario);
            localStorage.setItem('retirementScenarios', JSON.stringify(savedScenarios));
            render();
        }
        
        function loadScenario(id) {
            const scenario = savedScenarios.find(s => s.id === id);
            if (scenario) {
                Object.assign(state, scenario.data);
                render();
            }
        }
        
        function deleteScenario(id) {
            savedScenarios = savedScenarios.filter(s => s.id !== id);
            localStorage.setItem('retirementScenarios', JSON.stringify(savedScenarios));
            render();
        }
        
        // Load scenarios from localStorage
        function loadSavedScenarios() {
            const saved = localStorage.getItem('retirementScenarios');
            if (saved) {
                savedScenarios = JSON.parse(saved);
            }
        }
        
        // Render dashboard
        function render() {
            const currentTotal = getTotalAssets();
            const yearsToRetirement = state.retirementAge - state.currentAge;
            const portfolioAtRetirement = calcPortfolioAtRetirement(state.retirementAge, state.projectedReturn);
            const portfolioAtRetirementConservative = calcPortfolioAtRetirement(state.retirementAge, state.conservativeReturn);
            const portfolioInTodaysDollars = adjustForInflation(portfolioAtRetirement, yearsToRetirement);
            const annualWithdrawal = portfolioAtRetirement * (state.withdrawalRate / 100);
            const afterTaxIncome = annualWithdrawal * (1 - state.effectiveTaxRate / 100);
            const monthlyAfterTaxIncome = afterTaxIncome / 12;
            
            // Scenarios at different retirement ages
            const scenarios = [];
            for (let offset = -2; offset <= 6; offset += 2) {
                const age = Math.max(state.currentAge + 1, state.retirementAge + offset);
                const years = age - state.currentAge;
                const portfolio = calcPortfolioAtRetirement(age, state.projectedReturn);
                const portfolioToday = adjustForInflation(portfolio, years);
                scenarios.push({
                    age,
                    years,
                    portfolio,
                    portfolioToday,
                    withdrawal: portfolio * (state.withdrawalRate / 100),
                    highlight: age === state.retirementAge
                });
            }
            
            // Monte Carlo simulations
            const monteCarloBase = runMonteCarloSimulation(state.retirementAge);
            const monteCarloEarly = runMonteCarloSimulation(Math.max(state.currentAge + 1, state.retirementAge - 2));
            const monteCarloLate = runMonteCarloSimulation(state.retirementAge + 2);
            
            // Year by year data
            const yearByYearData = generateYearByYear();
            
            app.innerHTML = `
                <!-- SECTION 1: INPUTS -->
                <div class="section">
                    <h2>📋 Input Factors</h2>
                    
                    <div style="margin-bottom: 30px;">
                        <h3>Personal Information</h3>
                        <div class="input-grid">
                            <div class="input-group">
                                <label>Current Age</label>
                                <input type="number" data-key="currentAge" step="1" value="${state.currentAge}"/>
                            </div>
                            <div class="input-group">
                                <label>Current Year</label>
                                <input type="number" data-key="currentYear" step="1" value="${state.currentYear}"/>
                            </div>
                            <div class="input-group">
                                <label>Retirement Age</label>
                                <input type="number" data-key="retirementAge" step="1" value="${state.retirementAge}"/>
                            </div>
                            <div class="input-group">
                                <label>Years in Retirement</label>
                                <input type="number" data-key="yearsInRetirement" step="1" value="${state.yearsInRetirement}"/>
                            </div>
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 30px;">
                        <h3>Current Assets</h3>
                        <div class="input-grid">
                            <div class="input-group">
                                <label>Taxable Assets</label>
                                <input type="number" data-key="taxableAssets" step="1" value="${state.taxableAssets}"/>
                            </div>
                            <div class="input-group">

        // Show scenario comparison
        function showComparison(comparisonScenario) {
            const baseScenario = state;
            const section = document.getElementById('comparisonSection');
            const grid = document.getElementById('comparisonGrid');
            
            if (!section || !grid) return;
            
            const baseMetrics = calculateScenarioMetrics(baseScenario);
            const compMetrics = calculateScenarioMetrics(comparisonScenario.data);
            
            grid.innerHTML = `
                <div class="comparison-card base">
                    <div class="comparison-title">Current Scenario</div>
                    ${Object.entries(baseMetrics).map(([key, value]) => `

                            <div class="comparison-label">${key}</div>
                            <div class="comparison-value">${value}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            section.style.display = 'block';
            section.scrollIntoView({ behavior: 'smooth' });
        }
        
        // Calculate key metrics for a scenario
        function calculateScenarioMetrics(stateData) {
            const total = stateData.taxableAssets + stateData.pretaxAssets + stateData.rothAssets;
            const yearsToRet = stateData.retirementAge - stateData.currentAge;
            
            let balance = total;
            for (let i = 0; i < yearsToRet; i++) {
                balance = balance * (1 + stateData.projectedReturn / 100) + stateData.annualContribution;
            }
            
            const withdraw = balance * (stateData.withdrawalRate / 100);
            const afterTax = withdraw * (1 - stateData.effectiveTaxRate / 100);
            
            return {
                'Retirement Age': stateData.retirementAge,
                'Years to Retire': yearsToRet,
                'Portfolio at Retirement': fmt(balance),
                'Annual Withdrawal': fmt(withdraw),
                'After-Tax Income': fmt(afterTax),
                'Monthly Income': fmt(afterTax / 12),
                'Success Probability': pct(runMonteCarloSimulation(stateData.retirementAge, 500)),
                'Spending Type': stateData.spendingType,
                'Return Assumption': pct(stateData.projectedReturn),
                'Withdrawal Rate': pct(stateData.withdrawalRate)
            };
        }
        
        // Initialize charts
        function initializeCharts(yearByYearData) {
            const chartConfig = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: true } }
            };
            
            // Growth chart
            const growthCtx = document.getElementById('growthChart');
            if (growthCtx) {
                const accumulationData = yearByYearData.filter(y => y.phase === 'accumulation');
                const retirementData = yearByYearData.filter(y => y.phase === 'retirement');
                
                new Chart(growthCtx, {
                    type: 'line',
                    data: {
                        labels: yearByYearData.map(y => y.age),
                        datasets: [
                            {
                                label: 'Portfolio Balance',
                                data: yearByYearData.map(y => y.balance),
                                borderColor: '#667eea',
                                backgroundColor: 'rgba(102, 126, 234, 0.1)',
                                fill: true,
                                tension: 0.4,
                                borderWidth: 2
                            },
                            {
                                label: 'In Today\'s Dollars',
                                data: yearByYearData.map((y, i) => {
                                    const yearsFromNow = y.year - state.currentYear;
                                    return adjustForInflation(y.balance, yearsFromNow);
                                }),
                                borderColor: '#764ba2',
                                borderDash: [5, 5],
                                borderWidth: 2,
                                fill: false
                            }
                        ]
                    },
                    options: {
                        ...chartConfig,
                        scales: {
                            y: {
                                ticks: { callback: v => '$' + (v / 1000000).toFixed(1) + 'M' }
                            }
                        }
                    }
                });
            }
            
            // Success probability chart
            const successCtx = document.getElementById('successChart');
            if (successCtx) {
                const ages = [55, 58, 60, 62, 65, 68, 70];
                const probs = ages.map(age => runMonteCarloSimulation(age, 500));
                
                new Chart(successCtx, {
                    type: 'bar',
                    data: {
                        labels: ages,
                        datasets: [{
                            label: 'Success Probability (%)',
                            data: probs,
                            backgroundColor: probs.map(p => 
                                p >= 90 ? '#16a34a' : p >= 75 ? '#f59e0b' : '#dc2626'
                            ),
                            borderRadius: 4
                        }]
                    },
                    options: {
                        ...chartConfig,
                        scales: {
                            y: { min: 0, max: 100 }
                        }
                    }
                });
            }
            
            // Asset allocation chart
            const allocationCtx = document.getElementById('allocationChart');
            if (allocationCtx) {
                new Chart(allocationCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Taxable', 'Pre-Tax', 'Roth'],
                        datasets: [{
                            data: [state.taxableAssets, state.pretaxAssets, state.rothAssets],
                            backgroundColor: ['#3b82f6', '#8b5cf6', '#ec4899'],
                            borderColor: '#fff'
                        }]
                    },
                    options: {
                        ...chartConfig,
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });
            }
            
            // Purchasing power chart
            const ppCtx = document.getElementById('purchasingPowerChart');
            if (ppCtx) {
                const retirementData = yearByYearData.filter(y => y.phase === 'retirement').slice(0, 20);
                
                new Chart(ppCtx, {
                    type: 'line',
                    data: {
                        labels: retirementData.map(y => y.age),
                        datasets: [{
                            label: 'Purchasing Power (Today\'s Dollars)',
                            data: retirementData.map(y => y.balanceInTodaysDollars || 0),
                            borderColor: '#8b5cf6',
                            backgroundColor: 'rgba(139, 92, 246, 0.1)',
                            fill: true,
                            tension: 0.4,
                            borderWidth: 2
                        }]
                    },
                    options: {
                        ...chartConfig,
                        scales: {
                            y: {
                                ticks: { callback: v => '$' + (v / 1000000).toFixed(1) + 'M' }
                            }
                        }
                    }
                });
            }
        }
        
        // Initial render - load saved scenarios first
        loadSavedScenarios();
        render();
    </script>
</body>
</html>
</html>
